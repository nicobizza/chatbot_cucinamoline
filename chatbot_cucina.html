<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente Cucina – Osteria</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a1a;
    color: #e8e8e8;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── SETUP SCREEN ── */
  #setup {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    padding: 2rem;
    gap: 1.5rem;
  }
  #setup h1 { font-size: 1.4rem; text-align: center; }
  #setup p  { font-size: 0.9rem; color: #aaa; text-align: center; max-width: 340px; }
  #setup input {
    width: 100%;
    max-width: 360px;
    padding: 0.75rem 1rem;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 8px;
    color: #e8e8e8;
    font-size: 0.95rem;
    letter-spacing: 0.05em;
  }
  #setup button {
    padding: 0.75rem 2rem;
    background: #c8510a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    width: 100%;
    max-width: 360px;
  }
  #setup button:hover { background: #e05c0e; }
  #setup .hint { font-size: 0.78rem; color: #666; }

  /* ── CHAT SCREEN ── */
  #chat { display: none; flex-direction: column; height: 100dvh; }

  header {
    padding: 0.75rem 1rem;
    background: #111;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 1rem; font-weight: 600; }
  header span { font-size: 0.75rem; color: #666; }
  #reset-btn {
    background: none;
    border: none;
    color: #666;
    font-size: 0.75rem;
    cursor: pointer;
    padding: 0.25rem 0.5rem;
  }
  #reset-btn:hover { color: #aaa; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .msg {
    max-width: 85%;
    padding: 0.65rem 0.9rem;
    border-radius: 12px;
    font-size: 0.95rem;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .msg.user {
    background: #c8510a;
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    background: #2a2a2a;
    color: #e8e8e8;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .msg.error {
    background: #3a1a1a;
    color: #ff6b6b;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    font-size: 0.85rem;
  }
  .typing {
    background: #2a2a2a;
    color: #888;
    align-self: flex-start;
    border-radius: 12px;
    border-bottom-left-radius: 4px;
    padding: 0.65rem 0.9rem;
    font-size: 0.85rem;
    font-style: italic;
  }

  #input-area {
    padding: 0.75rem;
    background: #111;
    border-top: 1px solid #333;
    display: flex;
    gap: 0.5rem;
    align-items: flex-end;
  }
  #user-input {
    flex: 1;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 0.65rem 0.9rem;
    color: #e8e8e8;
    font-size: 0.95rem;
    resize: none;
    min-height: 42px;
    max-height: 120px;
    font-family: inherit;
    line-height: 1.4;
  }
  #user-input:focus { outline: none; border-color: #c8510a; }
  #send-btn {
    background: #c8510a;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 1.3rem;
    cursor: pointer;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #send-btn:disabled { background: #444; cursor: not-allowed; }
  #send-btn:hover:not(:disabled) { background: #e05c0e; }

  .welcome {
    text-align: center;
    color: #555;
    font-size: 0.85rem;
    margin: auto;
    padding: 2rem;
  }
  .welcome strong { color: #888; display: block; margin-bottom: 0.5rem; font-size: 1rem; }
  .examples { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.4rem; }
  .ex-btn {
    background: #222;
    border: 1px solid #333;
    border-radius: 8px;
    color: #aaa;
    padding: 0.5rem 0.75rem;
    font-size: 0.85rem;
    cursor: pointer;
    text-align: left;
  }
  .ex-btn:hover { background: #2a2a2a; color: #ddd; }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup">
  <h1>🍽️ Assistente Cucina</h1>
  <p>Inserisci la tua Claude API key per accedere all'assistente.</p>
  <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." autocomplete="off" />
  <button onclick="saveKey()">Accedi</button>
  <p class="hint">La chiave viene salvata nel browser. Non viene mai inviata altrove.</p>
</div>

<!-- CHAT SCREEN -->
<div id="chat">
  <header>
    <h1>🍽️ Assistente Cucina</h1>
    <span id="status-dot" style="width:8px;height:8px;border-radius:50%;background:#4caf50;display:inline-block;"></span>
  </header>
  <div id="messages">
    <div class="welcome">
      <strong>Ciao! Chiedimi del venduto 👋</strong>
      Posso rispondere su quantità, medie e trend dei piatti.<br>
      <div class="examples">
        <button class="ex-btn" onclick="sendExample(this)">Quante tigelle vendiamo in media?</button>
        <button class="ex-btn" onclick="sendExample(this)">Qual è il piatto più venduto?</button>
        <button class="ex-btn" onclick="sendExample(this)">Quanto vendiamo di tiramisù al mese?</button>
        <button class="ex-btn" onclick="sendExample(this)">Confronta tagliatelle e balanzoni</button>
      </div>
    </div>
  </div>
  <div id="input-area">
    <textarea id="user-input" placeholder="Scrivi una domanda..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
// ── DATI DEL VENDUTO (solo quantità, senza incassi) ──────────────────────────
const DATI_VENDUTO = `DATI VENDUTO OSTERIA - Giugno 2025 / Giugno 2026
Periodo: 12 mesi. Base: 312 giorni lavorativi, 52 settimane.

PATTERN GIORNO SETTIMANA (verificato su dati reali - ATIPICO per Bologna business city):
  lunedi:    x1.26 - GIORNO PIU ALTO (business lunch)
  martedi:   x0.89
  mercoledi: x1.15 - secondo piu alto
  giovedi:   x0.74
  venerdi:   x0.73 - GIORNO PIU BASSO (gente lascia Bologna)
  sabato:    x1.16
  domenica:  x1.07
Questo pattern vale tutto l anno. In estate i volumi assoluti calano ma le proporzioni rimangono simili.

MEDIE PER PRODOTTO (annuale | settimanale | giornaliero | per giorno settimana)

TAGLIATELLE RAGU (tutte): 32469 ann | 624/sett | 104/g | lun:131 mar:93 mer:120 gio:77 ven:76 sab:121 dom:112
LASAGNE/LASAGNA (tutte): 19141 ann | 368/sett | 61/g | lun:77 mar:55 mer:70 gio:45 ven:45 sab:71 dom:66

COTOLETTA (tutte): 5915 ann | 114/sett | 19/g | lun:24 mar:17 mer:22 gio:14 ven:14 sab:22 dom:20
BRUSCHETTA POMODORO: 4627 ann | 89/sett | 15/g | lun:19 mar:13 mer:17 gio:11 ven:11 sab:17 dom:16
AGG. TIGELLE: 3969 ann | 76/sett | 13/g | lun:16 mar:11 mer:14 gio:10 ven:9 sab:15 dom:14

Primo del Giorno (tutte): 4607 ann | 89/sett | 15/g | lun:19 mar:13 mer:17 gio:11 ven:11 sab:17 dom:16
POLPETTE (tutte): 2977 ann | 57/sett | 10/g | lun:12 mar:9 mer:11 gio:7 ven:7 sab:11 dom:10
Tortelloni ROSSI (tutte): 3676 ann | 71/sett | 12/g | lun:15 mar:11 mer:13 gio:9 ven:9 sab:14 dom:12
Tortelloni ZUCCA (tutte): 2942 ann | 57/sett | 9/g | lun:12 mar:8 mer:11 gio:7 ven:7 sab:11 dom:10
SALAME CIOCCOLATO: 1492 ann | 29/sett | 5/g
PATATE AL FORNO: 1437 ann | 28/sett | 5/g
POLPETTE AL SUGO: 1357 ann | 26/sett | 4/g
INSALATONA: 2457 ann | 47/sett | 8/g | lun:10 mar:7 mer:9 gio:6 ven:6 sab:9 dom:8
CAPRESE: 2861 ann | 55/sett | 9/g | lun:11 mar:8 mer:10 gio:7 ven:7 sab:10 dom:10
CLASSICO tagliere: 2412 ann | 46/sett | 8/g
TORTA DI RISO: 2023 ann | 39/sett | 6/g
TIGELLA FRIGGIONE: 1615 ann | 31/sett | 5/g
Tigella PESTO MONTANARO: 1168 ann | 22/sett | 4/g
TIGELLA MORTADELLA: 549 ann | 11/sett | 2/g
TIGELLA RAGU: 850 ann | 16/sett | 3/g
TIGELLA CRUDO: 364 ann | 7/sett | 1/g
BRUSCHETTA RAGU (tutte): 959 ann | 18/sett | 3/g
BRUSCHETTA FRIGGIONE: 1050 ann | 20/sett | 3/g
ZUPPA INGLESE: 564 ann | 11/sett | 2/g
MORTADELLA piatto: 2070 ann | 40/sett | 7/g
CRUDO piatto: 1452 ann | 28/sett | 5/g
FORMAGGI tagliere: 634 ann | 12/sett | 2/g
GRANDE tagliere: 824 ann | 16/sett | 3/g
GLUTEN FREE RAGU: 521 ann | 10/sett | 2/g`;


// ── DATA CONTESTUALE (data dinamica) ─────────────────────────────────────────
function getContextoOggi() {
  const ora = new Date();
  const giorni = ['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];
  const mesi = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
  const giorno = giorni[ora.getDay()];
  const data = `${ora.getDate()} ${mesi[ora.getMonth()]} ${ora.getFullYear()}`;
  const ore = ora.getHours();
  const servizio = ore < 15 ? 'pranzo' : 'cena';
  return `OGGI: ${giorno}, ${data} — servizio di ${servizio}`;
}

// ── SYSTEM PROMPT ────────────────────────────────────────────────────────────
function buildSystemPrompt() {
  const oggiDate = new Date();
  const giorni = ['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];

  // Calcola i prossimi 7 giorni con nome e data
  const prossimaSett = [];
  for (let i = 1; i <= 7; i++) {
    const d = new Date(oggiDate);
    d.setDate(oggiDate.getDate() + i);
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    prossimaSett.push(giorni[d.getDay()] + ' ' + dd + '/' + mm);
  }

  const reali = DATI_REALI ? '\n\nDATI REALI DAL FOGLIO VENDUTO (aggiornati oggi — usa QUESTI per date specifiche):\n' +
    'Quando ti chiedono "ieri", "il 5 giugno", "lunedì scorso" ecc., cerca la data nei DATI REALI qui sotto e dai il numero esatto.\n' +
    'Se la data è presente, usa SEMPRE il numero reale — non le stime storiche.\n' +
    DATI_REALI : '';

  return \`Sei l'assistente della cucina dell'Osteria Moline. Rispondi SOLO a domande sulle quantità di prodotti venduti.

\${getContextoOggi()}
Prossimi 7 giorni: \${prossimaSett.join(' | ')}

REGOLA ASSOLUTA:
Non devi MAI fornire informazioni su prezzi, incassi, fatturato, ricavi, importi, food cost o qualsiasi dato economico.
Se ti chiedono questi dati rispondi: "Non posso rispondere a domande su incassi o dati economici."

COSA PUOI FARE:
- Dire quante porzioni di un piatto vengono vendute in media (annuale, mensile, settimanale, giornaliero, per giorno della settimana)
- Confrontare quantità tra piatti
- Fare STIME per oggi, domani, questa settimana, la prossima settimana
- Rispondere a domande tipo "quante ne preparo oggi?", "quante tigelle mi aspetto stasera?"

COME FARE LE STIME — REGOLA ASSOLUTA:
In DATI_VENDUTO ogni prodotto ha già i valori reali per ogni giorno della settimana:
  es. TAGLIATELLE RAGU: lun:131 mar:93 mer:120 gio:77 ven:76 sab:121 dom:112

REGOLA: quando stimi "oggi" o un giorno specifico, USA SEMPRE e SOLO il valore DOW (lun/mar/mer/gio/ven/sab/dom).
MAI fare calcoli partendo da medie mensili o annuali — quei numeri non interessano al cuoco.
NON menzionare mai medie mensili o annuali nelle risposte sulle stime giornaliere.

Esempio CORRETTO per domenica: "Tagliatelle: circa 112 porzioni (±15%, tra 95 e 130)"
Esempio SBAGLIATO: "Tagliatelle: tra 160-190 (media ~4700/mese)" — NON fare così

Per la prossima settimana: elenca ogni giorno con il valore DOW corrispondente di ogni piatto.
In estate (giugno–agosto) applica -10% sui valori DOW.
Dai sempre numeri concreti, mai "non so" o "dipende dalle prenotazioni".

DATI STORICI (12 mesi giugno 2025 - giugno 2026):
\${DATI_VENDUTO}\${reali}

Rispondi in italiano, breve e diretto. Somma le varianti dello stesso piatto (es. TAGLIATELLE RAGU = tutte le varianti).\`;
}

// ── STATE ────────────────────────────────────────────────────────────────────
const API_KEY = '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';
let messages = [];
let isLoading = false;
let DATI_REALI = '';
// Dopo aver deployato il Google Apps Script, incolla qui l'URL:
let APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwrjOIfIj6G83kZWuxriVsHXRpQF1nTLlOAZhNFQ273IRQR0SkP_l-4Tw6WcGq5u6kI/exec';

// ── CARICA DATI REALI DAL GOOGLE SHEET ───────────────────────────────────────
function loadDatiReali() {
  if (!APPS_SCRIPT_URL) return;
  const cbName = '_vcb' + Date.now();
  window[cbName] = function(data) {
    if (data && data.dati) {
      DATI_REALI = data.dati;
      const b = document.getElementById('dati-banner');
      if (b) { b.textContent = '✓ Dati aggiornati al ' + (data.aggiornato || ''); b.style.display = 'block'; }
    }
    delete window[cbName];
  };
  const s = document.createElement('script');
  s.src = APPS_SCRIPT_URL + '?callback=' + cbName;
  s.onerror = () => delete window[cbName];
  document.body.appendChild(s);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
window.onload = () => {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('chat').style.display = 'flex';
  document.getElementById('user-input').focus();
  loadDatiReali();
};

// ── UI HELPERS ───────────────────────────────────────────────────────────────
function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  // Remove welcome message on first real message
  const welcome = document.querySelector('.welcome');
  if (welcome) welcome.remove();
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing-indicator';
  div.textContent = 'sto cercando…';
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendExample(btn) {
  document.getElementById('user-input').value = btn.textContent;
  sendMessage();
}

// ── SEND ─────────────────────────────────────────────────────────────────────
async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  addMsg('user', text);
  messages.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  addTyping();

  try {
    const key = API_KEY;
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 512,
        system: buildSystemPrompt(),
        messages: messages
      })
    });

    removeTyping();

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401) {
        addMsg('error', '❌ Chiave API non valida. Clicca "Cambia chiave" e reinserisci.');
      } else {
        addMsg('error', `❌ Errore ${res.status}: ${err.error?.message || 'riprova'}`);
      }
      messages.pop();
    } else {
      const data = await res.json();
      const reply = data.content?.[0]?.text || '(risposta vuota)';
      messages.push({ role: 'assistant', content: reply });
      addMsg('bot', reply);
    }
  } catch (e) {
    removeTyping();
    messages.pop();
    addMsg('error', '❌ Errore di rete. Controlla la connessione e riprova.');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}
</script>
</body>
</html>
