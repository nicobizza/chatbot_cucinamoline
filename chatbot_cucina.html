<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente Cucina – Osteria</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a1a;
    color: #e8e8e8;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── SETUP SCREEN ── */
  #setup {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    padding: 2rem;
    gap: 1.5rem;
  }
  #setup h1 { font-size: 1.4rem; text-align: center; }
  #setup p  { font-size: 0.9rem; color: #aaa; text-align: center; max-width: 340px; }
  #setup input {
    width: 100%;
    max-width: 360px;
    padding: 0.75rem 1rem;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 8px;
    color: #e8e8e8;
    font-size: 0.95rem;
    letter-spacing: 0.05em;
  }
  #setup button {
    padding: 0.75rem 2rem;
    background: #c8510a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    width: 100%;
    max-width: 360px;
  }
  #setup button:hover { background: #e05c0e; }
  #setup .hint { font-size: 0.78rem; color: #666; }

  /* ── CHAT SCREEN ── */
  #chat { display: none; flex-direction: column; height: 100dvh; }

  header {
    padding: 0.75rem 1rem;
    background: #111;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 1rem; font-weight: 600; }
  header span { font-size: 0.75rem; color: #666; }
  #reset-btn {
    background: none;
    border: none;
    color: #666;
    font-size: 0.75rem;
    cursor: pointer;
    padding: 0.25rem 0.5rem;
  }
  #reset-btn:hover { color: #aaa; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .msg {
    max-width: 85%;
    padding: 0.65rem 0.9rem;
    border-radius: 12px;
    font-size: 0.95rem;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .msg.user {
    background: #c8510a;
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    background: #2a2a2a;
    color: #e8e8e8;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .msg.error {
    background: #3a1a1a;
    color: #ff6b6b;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    font-size: 0.85rem;
  }
  .typing {
    background: #2a2a2a;
    color: #888;
    align-self: flex-start;
    border-radius: 12px;
    border-bottom-left-radius: 4px;
    padding: 0.65rem 0.9rem;
    font-size: 0.85rem;
    font-style: italic;
  }

  #input-area {
    padding: 0.75rem;
    background: #111;
    border-top: 1px solid #333;
    display: flex;
    gap: 0.5rem;
    align-items: flex-end;
  }
  #user-input {
    flex: 1;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 0.65rem 0.9rem;
    color: #e8e8e8;
    font-size: 0.95rem;
    resize: none;
    min-height: 42px;
    max-height: 120px;
    font-family: inherit;
    line-height: 1.4;
  }
  #user-input:focus { outline: none; border-color: #c8510a; }
  #send-btn {
    background: #c8510a;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 1.3rem;
    cursor: pointer;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #send-btn:disabled { background: #444; cursor: not-allowed; }
  #send-btn:hover:not(:disabled) { background: #e05c0e; }

  .welcome {
    text-align: center;
    color: #555;
    font-size: 0.85rem;
    margin: auto;
    padding: 2rem;
  }
  .welcome strong { color: #888; display: block; margin-bottom: 0.5rem; font-size: 1rem; }
  .examples { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.4rem; }
  .ex-btn {
    background: #222;
    border: 1px solid #333;
    border-radius: 8px;
    color: #aaa;
    padding: 0.5rem 0.75rem;
    font-size: 0.85rem;
    cursor: pointer;
    text-align: left;
  }
  .ex-btn:hover { background: #2a2a2a; color: #ddd; }
</style>

<!-- SETUP SCREEN -->
<div id="setup">
  <h1>🍽️ Assistente Cucina</h1>
  <p>Inserisci la tua Claude API key per accedere all'assistente.</p>
  <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." autocomplete="off" />
  <button onclick="saveKey()">Accedi</button>
  <p class="hint">La chiave viene salvata nel browser. Non viene mai inviata altrove.</p>
</div>

<!-- CHAT SCREEN -->
<div id="chat">
  <header>
    <h1>🍽️ Assistente Cucina</h1>
    <div style="display:flex;align-items:center;gap:0.5rem;">
      <span id="status-dot" style="width:8px;height:8px;border-radius:50%;background:#4caf50;display:inline-block;"></span>
      <button id="reset-btn" onclick="resetKey()">Cambia chiave</button>
    </div>
  </header>
  <div id="messages">
    <div class="welcome">
      <strong>Ciao! Chiedimi del venduto 👋</strong>
      Posso rispondere su quantità, medie e trend dei piatti.<br>
      <div class="examples">
        <button class="ex-btn" onclick="sendExample(this)">Quante tigelle vendiamo in media?</button>
        <button class="ex-btn" onclick="sendExample(this)">Qual è il piatto più venduto?</button>
        <button class="ex-btn" onclick="sendExample(this)">Quanto vendiamo di tiramisù al mese?</button>
        <button class="ex-btn" onclick="sendExample(this)">Confronta tagliatelle e balanzoni</button>
      </div>
    </div>
  </div>
  <div id="input-area">
    <textarea id="user-input" placeholder="Scrivi una domanda..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

// ── DATA CONTESTUALE (data dinamica) ─────────────────────────────────────────
function getContextoOggi() {
  const ora = new Date();
  const giorni = ['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];
  const mesi = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
  const giorno = giorni[ora.getDay()];
  const data = `${ora.getDate()} ${mesi[ora.getMonth()]} ${ora.getFullYear()}`;
  const ore = ora.getHours();
  const servizio = ore < 15 ? 'pranzo' : 'cena';
  return `OGGI: ${giorno}, ${data} — servizio di ${servizio}`;
}

// ── SYSTEM PROMPT ────────────────────────────────────────────────────────────
function buildSystemPrompt() {
  return `Sei l'assistente della cucina dell'Osteria. Rispondi SOLO a domande sulle quantità di prodotti venduti.

${getContextoOggi()}

REGOLA ASSOLUTA – NON NEGOZIABILE:
Non devi MAI fornire informazioni su prezzi, incassi, fatturato, ricavi, importi, food cost o qualsiasi dato economico o finanziario.
Se ti chiedono di questi argomenti, rispondi esattamente: "Non posso rispondere a domande su incassi o dati economici."

COSA PUOI FARE:
- Dire quante porzioni di un piatto vengono vendute (totale, media mensile)
- Confrontare quantità tra piatti
- Indicare i piatti più o meno venduti
- Fare STIME per oggi basandoti sui dati storici: ragiona su giorno della settimana (sabato/domenica = weekend più affollato, venerdì sera vivace, lunedì/martedì più tranquilli) e stagione (estate = più secondi e insalate, inverno = più pasta e brodi)
- Rispondere a domande tipo "quante ne preparo oggi?", "quante tigelle mi aspetto stasera?"

DATI A TUA DISPOSIZIONE:
${DATI_VENDUTO}

Quando fai stime per oggi: dividi la media mensile per ~26 giorni lavorativi, poi correggi per il giorno e la stagione:
- INVERNO/PRIMAVERA/AUTUNNO (settembre–maggio): weekend +30/40%, lunedì-martedì -20%
- ESTATE (giugno–agosto): weekend = feriale, nessuna correzione per il giorno della settimana
Esprimi sempre la stima come range (es. "tra 15 e 20 porzioni").

Rispondi sempre in italiano, in modo breve e diretto. Se non hai il dato esatto, di' cosa hai di simile. Usa le somme unificate quando ci sono varianti dello stesso piatto (es. TAGLIATELLE RAGU + TAGLIATELLE RAGU').`;
}

// ── STATE ────────────────────────────────────────────────────────────────────
let messages = [];
let isLoading = false;

// ── INIT ─────────────────────────────────────────────────────────────────────
window.onload = () => {
  const key = localStorage.getItem('osteria_api_key');
  if (key) showChat();
};

function saveKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('sk-ant-')) {
    alert('Chiave non valida. Deve iniziare con sk-ant-');
    return;
  }
  localStorage.setItem('osteria_api_key', val);
  showChat();
}

function showChat() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('chat').style.display = 'flex';
  document.getElementById('user-input').focus();
}

function resetKey() {
  if (!confirm('Vuoi cambiare la chiave API?')) return;
  localStorage.removeItem('osteria_api_key');
  messages = [];
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('chat').style.display = 'none';
  document.getElementById('api-key-input').value = '';
}

// ── UI HELPERS ───────────────────────────────────────────────────────────────
function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  // Remove welcome message on first real message
  const welcome = document.querySelector('.welcome');
  if (welcome) welcome.remove();
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing-indicator';
  div.textContent = 'sto cercando…';
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendExample(btn) {
  document.getElementById('user-input').value = btn.textContent;
  sendMessage();
}

// ── SEND ─────────────────────────────────────────────────────────────────────
async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  addMsg('user', text);
  messages.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  addTyping();

  try {
    const key = localStorage.getItem('osteria_api_key');
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 512,
        system: buildSystemPrompt(),
        messages: messages
      })
    });

    removeTyping();

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401) {
        addMsg('error', '❌ Chiave API non valida. Clicca "Cambia chiave" e reinserisci.');
      } else {
        addMsg('error', `❌ Errore ${res.status}: ${err.error?.message || 'riprova'}`);
      }
      messages.pop();
    } else {
      const data = await res.json();
      const reply = data.content?.[0]?.text || '(risposta vuota)';
      messages.push({ role: 'assistant', content: reply });
      addMsg('bot', reply);
    }
  } catch (e) {
    removeTyping();
    messages.pop();
    addMsg('error', '❌ Errore di rete. Controlla la connessione e riprova.');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}
</script>
